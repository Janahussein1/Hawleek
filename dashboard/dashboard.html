<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dashboard.css">
    <title>Global Admin Dashboard</title>
</head>
<body>

    <nav>
        <a href="#">Reservations</a> | 
        <a href="/Homepage /pages/clinics.html">Clinics</a> | 
        <a href="/Homepage /pages/transport.html">Transport</a> |
        <a href="/Homepage /pages/booking.html">Booking</a> |  
        <a href="/Homepage /index.html">Logout</a>
    </nav>

    <hr>

    <h1>Global Reservations Dashboard</h1>

    <div class="dashboard-container">
        <h2>Reservation Counts</h2>
        <ul>
            <li>Total Bookings: <strong id="stat-total">0</strong></li>
            <li>Pending: <strong id="stat-pending">0</strong></li>
            <li>Cancelled: <strong id="stat-cancelled">0</strong></li>
        </ul>
    </div>

    <hr>

    <h2>Add New Reservation (Manual Entry)</h2>
    <form id="addReservationForm">
        <label>Customer Name: <input type="text" id="resName" required></label><br><br>
        
        <label>Category: 
            <select id="resCategory" required>
                <option value="Clinic">Clinic</option>
                <option value="Restaurant">Restaurant</option>
                <option value="Transport">Transport</option>
                <option value="Service">Service</option>
            </select>
        </label><br><br>

        <label>Provider/Location: <input type="text" id="resProvider" placeholder="e.g., Dokki Dental or KFC" required></label><br><br>
        
        <label>Number of Guests/People: <input type="number" id="resGuests" required min="1"></label><br><br>
        
        <label>Date & Time: <input type="datetime-local" id="resDateTime" required></label><br><br>
        
        <button type="submit">Add Reservation</button>
    </form>

    <hr>

    <h2>All Reservations</h2>
    
    <label>Filter by: 
        <select id="filterCategory">
            <option value="All">All Categories</option>
            <option value="Clinic">Clinics</option>
            <option value="Restaurant">Restaurants</option>
            <option value="Transport">Transport</option>
            <option value="Service">Services</option>
        </select>
    </label>
    <br><br>

    <table border="1" cellpadding="10" cellspacing="0" width="100%">
        <thead>
            <tr>
                <th>Customer Name</th>
                <th>Category</th>
                <th>Provider</th>
                <th>Guests</th>
                <th>Date & Time</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="reservation-table-body">
            </tbody>
    </table>

    <script src="javadashboard.js"></script>
</body>
</html>
